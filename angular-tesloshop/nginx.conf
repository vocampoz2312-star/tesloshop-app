server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ─────────────────────────────────────────────
    # SPA Routing
    # Cuando el usuario navega a /productos/123,
    # el archivo físico no existe en el servidor.
    # try_files intenta encontrar el archivo, luego
    # el directorio, y si no existe ninguno sirve
    # index.html para que Angular maneje la ruta.
    # ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─────────────────────────────────────────────
    # Caché de recursos estáticos
    # JS, CSS e imágenes se cachean 1 año en el
    # navegador porque Angular les añade un hash
    # en el nombre del archivo en cada build.
    # ─────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ─────────────────────────────────────────────
    # Proxy hacia la API
    # ^~ indica que esta regla tiene prioridad sobre
    # la de extensiones estáticas de arriba.
    # Sin ^~, una ruta como /api/files/product/foto.jpg
    # sería capturada por el bloque de imágenes y
    # Nginx devolvería 404 buscando el archivo local.
    #
    # proxy_pass apunta a "backend" (nombre del servicio
    # en Docker Compose) en el puerto interno 3000.
    # ─────────────────────────────────────────────
    location ^~ /api {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─────────────────────────────────────────────
    # WebSockets (Socket.io)
    # Las conexiones WebSocket requieren las cabeceras
    # Upgrade y Connection para el handshake inicial.
    # ─────────────────────────────────────────────
    location /socket.io {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}